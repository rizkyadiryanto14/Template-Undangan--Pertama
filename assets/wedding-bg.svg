  <g fill="#536057" fill-opacity="0.18">
    <ellipse cx="1142" cy="752" rx="40" ry="17" transform="rotate(-32 1142 752)"/>
    <ellipse cx="1052" cy="768" rx="34" ry="14" transform="rotate(16 1052 768)"/>
  </g>

  <!-- Subtle border lines -->

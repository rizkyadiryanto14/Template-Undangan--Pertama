    <circle cx="1122" cy="728" r="30"/>
    <circle cx="1082" cy="752" r="22"/>
    <circle cx="1148" cy="684" r="22"/>
    <circle cx="1050" cy="712" r="17"/>
    <circle cx="1110" cy="758" r="16"/>
